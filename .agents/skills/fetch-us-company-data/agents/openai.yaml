interface:
  display_name: "Fetch US Company Data"
  short_description: "Flexible edgartools wrapper for US/SEC data pulls"
  default_prompt: "Use $fetch-us-company-data as an LLM-first edgartools operator. Prefer plain-language fetch requests (for example: latest 10-K plus subsequent 10-Qs, Form 4 transactions, entity facts, XBRL statements, attachments). Use scripts/edgartools_wrapper.py for deterministic execution."
  icon_small: "./assets/chadwin-icon.svg"
  icon_large: "./assets/chadwin-icon.png"
  brand_color: "#F43C00"

dependencies:
  python_packages:
    - "pandas>=2.0"
    - "pyyaml>=6.0"
    - "edgartools>=4.6.3"
    - "hishel<1.0.0"
    - "python-dotenv>=1.0.0"
    - "beautifulsoup4>=4.12"
