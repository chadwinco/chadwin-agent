interface:
  display_name: "Fetch US Company Data"
  short_description: "Fetch EDGAR filings and transcripts for US tickers"
  default_prompt: "Use $fetch-us-company-data to pull EDGAR filings, financials, and the latest earnings call transcript for a US ticker (or omit ticker to auto-pick from the shared ideas log), respecting <DATA_ROOT>/user_preferences.json by default."
  icon_small: "./assets/chadwin-icon.svg"
  icon_large: "./assets/chadwin-icon.png"
  brand_color: "#F43C00"

dependencies:
  python_packages:
    - "pandas>=2.0"
    - "pyyaml>=6.0"
    - "edgartools>=4.6.3"
    - "hishel<1.0.0"
    - "python-dotenv>=1.0.0"
    - "beautifulsoup4>=4.12"
