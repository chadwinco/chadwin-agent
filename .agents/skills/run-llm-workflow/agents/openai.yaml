interface:
  display_name: "Run LLM Workflow"
  short_description: "Progressive LLM-first report + valuation workflow with falsification built in"
  default_prompt: "Use $run-llm-workflow for <TICKER> as of <YYYY-MM-DD> (or omit ticker to auto-pick from the shared ideas log). Run a progressive issue-driven process: establish operating facts and analyst-implied market expectations, prioritize key unresolved investment issues by impact, investigate each with local evidence first (plus targeted high-quality external checks only when needed), and stop when thesis-critical points are resolved to expert-level confidence. Resolve report directory by first reusing `reports/YYYY-MM-DD` when it already has `valuation/inputs.yaml` but is missing `report.md` or `valuation/outputs.json` (incomplete bootstrap), and only use `YYYY-MM-DD-01`, `-02`, etc. for additional same-day runs after a complete package exists. Produce report.md plus valuation inputs/outputs, then remove the completed ticker from the queue."
