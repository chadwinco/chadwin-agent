interface:
  display_name: "Run LLM Workflow"
  short_description: "Progressive LLM-first report + valuation workflow with lever mapping and confidence stop gate"
  default_prompt: "Use $run-llm-workflow for <TICKER> as of <YYYY-MM-DD> (or omit ticker to auto-pick from the shared ideas log). Run a progressive issue-driven process: establish operating facts and analyst-implied market expectations, map key valuation levers early, prioritize unresolved high-impact levers, investigate each with local evidence first (plus targeted high-quality external checks only when needed), and keep iterating until confidence is high and additional work has diminishing returns. Write report.md in a narrative-first style centered on 3-5 valuation pillars, explicitly linking claim -> evidence -> model-assumption impact; avoid checklist-style fact dumps. Include a Research Stop Gate section in report.md so follow-up routing can decide whether to continue or stop. Resolve report directory by first reusing `reports/YYYY-MM-DD` when it already has `valuation/inputs.yaml` but is missing `report.md` or `valuation/outputs.json` (incomplete bootstrap), and only use `YYYY-MM-DD-01`, `-02`, etc. for additional same-day runs after a complete package exists. Produce report.md plus valuation inputs/outputs, then remove the completed ticker from the queue."
