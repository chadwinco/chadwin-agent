interface:
  display_name: "Run LLM Workflow"
  short_description: "LLM-first report + valuation workflow (no one-shot script)"
  default_prompt: "Use $run-llm-workflow for <TICKER> as of <YYYY-MM-DD> (or omit ticker to auto-pick from the shared ideas log). Work through the LLM research workflow end-to-end, applying preferences/user_preferences.json for strategy and report emphasis. Resolve report directory by first reusing `reports/YYYY-MM-DD` when it already has `valuation/inputs.yaml` but is missing `report.md` or `valuation/outputs.json` (incomplete bootstrap), and only use `YYYY-MM-DD-01`, `-02`, etc. for additional same-day runs after a complete package exists. Produce report.md plus valuation inputs/outputs, then remove the completed ticker from the queue."
