interface:
  display_name: "Run LLM Deep Dive"
  short_description: "Falsification-first deep research with revised valuation and explicit deltas"
  default_prompt: "Use $run-llm-deep-dive for <TICKER> as of <YYYY-MM-DD> using baseline report directory <YYYY-MM-DD or YYYY-MM-DD-XX>. Build a downside-focused original research plan, execute local plus targeted high-quality third-party checks (and older SEC pulls if useful), then deliver revised report.md, revised valuation inputs/outputs, deep-dive-plan.md, deep-dive-changes.md, and third-party-sources.md in a new report directory (`YYYY-MM-DD`, then `YYYY-MM-DD-01`, `-02`, etc. if needed). For SEC retrieval, use skill SEC scripts with configured EDGAR_IDENTITY (no ad-hoc direct sec.gov HTTP fetches)."
