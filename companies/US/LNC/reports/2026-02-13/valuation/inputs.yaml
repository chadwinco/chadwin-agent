notes: |
  Residual-income valuation is used because Lincoln National is a life insurer
  where statutory capital, reserve assumptions, and hedging effectiveness drive
  equity value more directly than reported free cash flow.

  Common equity is anchored to the latest local quarterly balance-sheet export
  (2025-09-30). Shares outstanding uses a market-implied proxy
  (marketCap / price) from company_profile.csv so per-share valuation aligns
  with the same price snapshot date.

  Base-case assumptions are anchored near analyst expectations (Hold consensus,
  average PT $45.92, 2026 revenue estimate $20.3B vs $19.2B in 2025) while
  keeping a conservative excess-return spread versus cost of equity due reserve,
  hedging, and rate-sensitivity risk highlighted in filings.
