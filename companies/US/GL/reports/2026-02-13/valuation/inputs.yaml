notes: |
  Residual-income valuation is used because Globe Life is a life insurer where
  equity value is better anchored to book value growth and excess ROE over the
  cost of equity than to free-cash-flow mechanics.

  Common equity is anchored to the latest local quarterly balance-sheet export
  (2025-09-30). Shares outstanding uses a market-implied proxy
  (marketCap / price) from company_profile.csv to keep denominator alignment
  with the same price snapshot.

  Assumptions are anchored to local evidence: FY2025 net-income ROE of 20.9%
  (8-K earnings release), buy-rated analyst consensus with average PT $166.67,
  and continued premium/EPS growth trends. Cost-of-equity remains above long-run
  growth to preserve downside room for capital and mortality-cycle risk.
