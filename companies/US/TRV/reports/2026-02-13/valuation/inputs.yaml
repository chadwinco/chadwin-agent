notes: |
  Residual-income valuation is used because Travelers is a property & casualty
  insurer where underwriting cycle quality, reserve development, catastrophe
  volatility, and capital returns determine equity value more directly than a
  conventional FCF DCF.

  Common equity is anchored to 2025-12-31 annual statements. Shares outstanding
  is a market-implied proxy (marketCap / price) from company_profile.csv to keep
  the per-share basis aligned to the same quote snapshot.

  Assumptions are anchored to local evidence: FY2025 diluted EPS $27.43,
  net income $6.29B, combined ratio 91.7%, catastrophe losses $3.69B,
  and continued buyback authorization/execution. The base case keeps only a
  modest MOS, consistent with Hold consensus and low-single-digit average target
  upside.
